<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empty Legs Admin — JetLux</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #C9A84C;
      --gold-dim: rgba(201,168,76,0.3);
      --bg: #050505;
      --surface: #0f0f0f;
      --surface2: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --text: #f0ede8;
      --text-dim: rgba(240,237,232,0.45);
      --red: #e05252;
      --green: #52b788;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; min-height: 100vh; }

    /* HEADER */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header-logo { font-size: 16px; font-weight: 600; letter-spacing: 0.08em; }
    .header-logo span { color: var(--gold); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .token-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 4px; font-family: inherit; font-size: 12px; width: 280px; }
    .token-input:focus { outline: none; border-color: var(--gold-dim); }
    .btn { padding: 8px 16px; border-radius: 4px; font-family: inherit; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border: none; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-gold { background: var(--gold); color: #050505; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
    .btn-outline:hover { border-color: var(--gold-dim); color: var(--text); }
    .btn-danger { background: transparent; border: 1px solid rgba(224,82,82,0.3); color: var(--red); font-size: 10px; padding: 5px 10px; }
    .btn-danger:hover { background: rgba(224,82,82,0.08); opacity: 1; }
    .btn-edit { background: transparent; border: 1px solid var(--gold-dim); color: var(--gold); font-size: 10px; padding: 5px 10px; }
    .btn-edit:hover { background: rgba(201,168,76,0.08); opacity: 1; }

    /* LAYOUT */
    .main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .section-title { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }

    /* STATUS BAR */
    .status-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; margin-bottom: 28px; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-dim); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    #status-text { flex: 1; }

    /* FLIGHTS TABLE */
    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 40px; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 10px 14px; text-align: left; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); font-weight: 500; border-bottom: 1px solid var(--border); background: var(--surface); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.03); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.015); }
    td { padding: 12px 14px; vertical-align: middle; color: var(--text-dim); white-space: nowrap; }
    td.bold { color: var(--text); font-weight: 500; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 9px; font-weight: 600; letter-spacing: 0.1em; }
    .badge-hot { background: rgba(201,168,76,0.15); color: var(--gold); }
    .badge-new { background: rgba(82,183,136,0.15); color: var(--green); }
    .td-actions { display: flex; gap: 6px; }
    #flights-tbody .empty-row td { text-align: center; padding: 32px; color: var(--text-dim); }

    /* FORM */
    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 24px; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); }
    .form-group input, .form-group select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: 4px; font-family: inherit; font-size: 12px; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--gold-dim); }
    .form-group select option { background: #1a1a1a; }
    .form-actions { display: flex; gap: 10px; align-items: center; }
    #form-feedback { font-size: 12px; }
    .feedback-ok { color: var(--green); }
    .feedback-err { color: var(--red); }

    /* MODAL */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 200; padding: 24px; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 28px; width: 100%; max-width: 760px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 13px; font-weight: 600; letter-spacing: 0.05em; }
    .modal-close { background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; padding: 4px; }
    .modal-close:hover { color: var(--text); }
  </style>
</head>
<body>

<header class="header">
  <div class="header-logo">Jet<span>Lux</span> <span style="color:var(--text-dim);font-weight:400;font-size:12px;">/ Admin</span></div>
  <div class="header-right">
    <input type="password" class="token-input" id="token-input" placeholder="Admin token..." autocomplete="off" />
    <button class="btn btn-gold" onclick="loadFlights()">Connect</button>
  </div>
</header>

<main class="main">

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Enter your admin token and click Connect to manage empty leg flights.</span>
  </div>

  <!-- FLIGHTS LIST -->
  <p class="section-title">Current Flights</p>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Route</th>
          <th>Date</th>
          <th>Departs</th>
          <th>Aircraft</th>
          <th>Pax</th>
          <th>Price</th>
          <th>Original</th>
          <th>Saving</th>
          <th>Badge</th>
          <th>Region</th>
          <th>Class</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="flights-tbody">
        <tr class="empty-row"><td colspan="12">Not connected.</td></tr>
      </tbody>
    </table>
  </div>

  <!-- ADD / EDIT FORM -->
  <p class="section-title" id="form-title">Add New Flight</p>
  <div class="form-card">
    <input type="hidden" id="edit-id" value="" />
    <div class="form-grid">
      <div class="form-group">
        <label>From (City)</label>
        <input type="text" id="f-from" placeholder="London" />
      </div>
      <div class="form-group">
        <label>To (City)</label>
        <input type="text" id="f-to" placeholder="Dubai" />
      </div>
      <div class="form-group">
        <label>From Airport Code</label>
        <input type="text" id="f-from-code" placeholder="LGW" />
      </div>
      <div class="form-group">
        <label>To Airport Code</label>
        <input type="text" id="f-to-code" placeholder="DXB" />
      </div>
      <div class="form-group">
        <label>Duration</label>
        <input type="text" id="f-duration" placeholder="~7h" />
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="f-date" />
      </div>
      <div class="form-group">
        <label>Departs (HH:MM)</label>
        <input type="time" id="f-departs" />
      </div>
      <div class="form-group">
        <label>Aircraft</label>
        <input type="text" id="f-aircraft" placeholder="Gulfstream G450" />
      </div>
      <div class="form-group">
        <label>Max Passengers</label>
        <input type="number" id="f-pax" min="1" max="50" placeholder="14" />
      </div>
      <div class="form-group">
        <label>Saving %</label>
        <input type="number" id="f-saving" min="1" max="99" placeholder="72" />
      </div>
      <div class="form-group">
        <label>Price (USD)</label>
        <input type="number" id="f-price" min="0" placeholder="13500" />
      </div>
      <div class="form-group">
        <label>Original Price (USD)</label>
        <input type="number" id="f-original" min="0" placeholder="48000" />
      </div>
      <div class="form-group">
        <label>Badge</label>
        <select id="f-badge">
          <option value="">None</option>
          <option value="HOT">HOT</option>
          <option value="NEW">NEW</option>
        </select>
      </div>
      <div class="form-group">
        <label>Region</label>
        <select id="f-region">
          <option value="">— Select —</option>
          <option>Americas</option>
          <option>Europe</option>
          <option>Middle East</option>
          <option>Asia</option>
          <option>Africa</option>
        </select>
      </div>
      <div class="form-group">
        <label>Jet Class</label>
        <select id="f-class">
          <option value="">— Select —</option>
          <option>Light Jets</option>
          <option>Midsize Jets</option>
          <option>Heavy Jets</option>
          <option>Ultra-Long Range</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-gold" onclick="submitFlight()">Save Flight</button>
      <button class="btn btn-outline" onclick="resetForm()" id="cancel-btn" style="display:none;">Cancel Edit</button>
      <span id="form-feedback"></span>
    </div>
  </div>

</main>

<script>
  const API = '/api/empty-legs';

  function token() {
    return document.getElementById('token-input').value.trim();
  }

  function setStatus(msg, ok) {
    document.getElementById('status-text').textContent = msg;
    const dot = document.getElementById('status-dot');
    dot.className = 'status-dot' + (ok ? ' connected' : '');
  }

  function fmt(n) {
    return '$' + Number(n).toLocaleString('en-US');
  }

  function renderTable(flights) {
    const tbody = document.getElementById('flights-tbody');
    if (!flights.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="12">No flights in the system. Add one below.</td></tr>';
      return;
    }
    tbody.innerHTML = flights.map(f => `
      <tr>
        <td class="bold">${f.from} → ${f.to}</td>
        <td>${f.date}</td>
        <td>${f.departs}</td>
        <td>${f.aircraft}</td>
        <td>${f.pax}</td>
        <td class="bold">${fmt(f.price)}</td>
        <td style="text-decoration:line-through;color:var(--text-dim)">${fmt(f.original_price)}</td>
        <td>${f.saving_pct}%</td>
        <td>${f.badge ? `<span class="badge badge-${f.badge.toLowerCase()}">${f.badge}</span>` : '—'}</td>
        <td>${f.region || '—'}</td>
        <td>${f.jet_class || '—'}</td>
        <td>
          <div class="td-actions">
            <button class="btn btn-edit" onclick="editFlight('${f.id}')">Edit</button>
            <button class="btn btn-danger" onclick="deleteFlight('${f.id}', '${f.from} → ${f.to}')">Delete</button>
          </div>
        </td>
      </tr>`).join('');
  }

  async function loadFlights() {
    if (!token()) { setStatus('Enter an admin token first.', false); return; }
    setStatus('Connecting…', false);
    try {
      const res = await fetch(API, {
        headers: { 'Authorization': `Bearer ${token()}` }
      });
      if (res.status === 401) { setStatus('Invalid token. Access denied.', false); return; }
      if (!res.ok) throw new Error(res.status);
      const flights = await res.json();
      window._flights = flights;
      renderTable(flights);
      setStatus(`Connected — ${flights.length} flight${flights.length !== 1 ? 's' : ''} in the system.`, true);
    } catch {
      setStatus('Connection failed. Check the API is deployed.', false);
    }
  }

  async function deleteFlight(id, label) {
    if (!confirm(`Delete flight: ${label}?`)) return;
    try {
      const res = await fetch(`${API}/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token()}` }
      });
      if (res.status === 401) { alert('Invalid token.'); return; }
      if (!res.ok) throw new Error(res.status);
      await loadFlights();
    } catch {
      alert('Delete failed. Try again.');
    }
  }

  function editFlight(id) {
    const f = (window._flights || []).find(x => x.id === id);
    if (!f) return;
    document.getElementById('edit-id').value = id;
    document.getElementById('f-from').value = f.from;
    document.getElementById('f-to').value = f.to;
    document.getElementById('f-from-code').value = f.from_code || '';
    document.getElementById('f-to-code').value = f.to_code || '';
    document.getElementById('f-duration').value = f.duration || '';
    document.getElementById('f-date').value = f.date;
    document.getElementById('f-departs').value = f.departs;
    document.getElementById('f-aircraft').value = f.aircraft;
    document.getElementById('f-pax').value = f.pax;
    document.getElementById('f-saving').value = f.saving_pct;
    document.getElementById('f-price').value = f.price;
    document.getElementById('f-original').value = f.original_price;
    document.getElementById('f-badge').value = f.badge || '';
    document.getElementById('f-region').value = f.region || '';
    document.getElementById('f-class').value = f.jet_class || '';
    document.getElementById('form-title').textContent = `Editing: ${f.from} → ${f.to}`;
    document.getElementById('cancel-btn').style.display = '';
    document.getElementById('f-from').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resetForm() {
    document.getElementById('edit-id').value = '';
    ['f-from','f-to','f-from-code','f-to-code','f-duration','f-date','f-departs','f-aircraft','f-pax','f-saving','f-price','f-original'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-badge').value = '';
    document.getElementById('f-region').value = '';
    document.getElementById('f-class').value = '';
    document.getElementById('form-title').textContent = 'Add New Flight';
    document.getElementById('cancel-btn').style.display = 'none';
    document.getElementById('form-feedback').textContent = '';
  }

  async function submitFlight() {
    const fb = document.getElementById('form-feedback');
    fb.textContent = '';

    const body = {
      from: document.getElementById('f-from').value.trim(),
      to: document.getElementById('f-to').value.trim(),
      from_code: document.getElementById('f-from-code').value.trim(),
      to_code: document.getElementById('f-to-code').value.trim(),
      duration: document.getElementById('f-duration').value.trim(),
      date: document.getElementById('f-date').value,
      departs: document.getElementById('f-departs').value,
      aircraft: document.getElementById('f-aircraft').value.trim(),
      pax: document.getElementById('f-pax').value,
      saving_pct: document.getElementById('f-saving').value,
      price: document.getElementById('f-price').value,
      original_price: document.getElementById('f-original').value,
      badge: document.getElementById('f-badge').value,
      region: document.getElementById('f-region').value,
      jet_class: document.getElementById('f-class').value,
    };

    const required = ['from','to','date','departs','aircraft','pax','saving_pct','price','original_price'];
    const missing = required.filter(k => !body[k]);
    if (missing.length) {
      fb.className = 'feedback-err';
      fb.textContent = `Missing: ${missing.join(', ')}`;
      return;
    }

    const editId = document.getElementById('edit-id').value;
    const isEdit = Boolean(editId);
    const url = isEdit ? `${API}/${editId}` : API;
    const method = isEdit ? 'PUT' : 'POST';

    try {
      const res = await fetch(url, {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token()}`,
        },
        body: JSON.stringify(body),
      });
      if (res.status === 401) { fb.className = 'feedback-err'; fb.textContent = 'Invalid token.'; return; }
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        fb.className = 'feedback-err';
        fb.textContent = err.error || `Error ${res.status}`;
        return;
      }
      fb.className = 'feedback-ok';
      fb.textContent = isEdit ? 'Flight updated.' : 'Flight added.';
      resetForm();
      await loadFlights();
    } catch {
      fb.className = 'feedback-err';
      fb.textContent = 'Request failed. Try again.';
    }
  }

  // Connect on Enter key in token field
  document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadFlights();
  });
</script>

</body>
</html>
